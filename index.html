<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexusAI</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c6dfa'/><text y='.9em' font-size='70' x='50%' dominant-baseline='middle' text-anchor='middle'>✦</text></svg>"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #fff;
        --surface: #f9f9f9;
        --border: #e5e5e5;
        --text: #1a1a1a;
        --muted: #6b6b6b;
        --dim: #aaaaaa;
        --accent: #7c6dfa;
        --user-bg: #7c6dfa;
        --bot-bg: #f4f4f4;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .topbar {
        width: 100%;
        max-width: 720px;
        padding: 18px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .topbar-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 17px;
        font-weight: 600;
      }
      .topbar-logo .dot {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 14px;
      }
      .new-btn {
        padding: 7px 16px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--muted);
        font-family: inherit;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .new-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .chat-area {
        flex: 1;
        width: 100%;
        max-width: 720px;
        overflow-y: auto;
        padding: 0 20px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        scroll-behavior: smooth;
      }
      .chat-area::-webkit-scrollbar {
        width: 0;
      }
      .welcome {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        flex: 1;
        padding: 60px 0 20px;
        gap: 10px;
      }
      .welcome-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 20px;
        margin-bottom: 8px;
      }
      .welcome h1 {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: -0.3px;
        line-height: 1.3;
      }
      .welcome h1 span {
        color: var(--accent);
      }
      .welcome p {
        font-size: 15px;
        color: var(--muted);
        line-height: 1.7;
        max-width: 480px;
      }
      .suggestions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
      }
      .sug {
        padding: 9px 16px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-family: inherit;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .sug:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: #f5f3ff;
      }
      .msg {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        animation: in 0.25s ease both;
      }
      @keyframes in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .msg.user {
        flex-direction: row-reverse;
      }
      .msg-av {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
      }
      .msg.bot .msg-av {
        background: #f0eeff;
        color: var(--accent);
      }
      .msg.user .msg-av {
        background: var(--accent);
        color: #fff;
      }
      .bubble {
        max-width: 78%;
        padding: 12px 16px;
        font-size: 14px;
        line-height: 1.75;
        word-break: break-word;
        border-radius: 18px;
      }
      .msg.bot .bubble {
        background: var(--bot-bg);
        color: var(--text);
        border-top-left-radius: 4px;
      }
      .msg.user .bubble {
        background: var(--user-bg);
        color: #fff;
        border-top-right-radius: 4px;
      }
      .bubble a {
        color: var(--accent);
        text-decoration: underline;
      }
      .bubble code {
        background: rgba(0, 0, 0, 0.07);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 12px;
      }
      .bubble pre {
        background: rgba(0, 0, 0, 0.05);
        padding: 12px;
        border-radius: 8px;
        margin-top: 8px;
        overflow-x: auto;
        font-size: 12px;
        position: relative;
      }
      .bubble strong {
        font-weight: 600;
      }
      .bubble img {
        max-width: 100%;
        border-radius: 10px;
        margin-top: 8px;
        display: block;
      }
      .file-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(0, 0, 0, 0.06);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
      }
      .copy-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--muted);
        font-size: 11px;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.2s;
      }
      .copy-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .copy-btn.copied {
        border-color: #22c55e;
        color: #22c55e;
      }
      .typing-dots {
        display: flex;
        gap: 4px;
        padding: 4px 0;
      }
      .typing-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--dim);
        animation: td 1.2s infinite;
      }
      .typing-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes td {
        0%,
        60%,
        100% {
          transform: translateY(0);
        }
        30% {
          transform: translateY(-6px);
        }
      }
      .input-wrap {
        width: 100%;
        max-width: 720px;
        padding: 12px 20px 24px;
      }
      .input-box {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        border: 1.5px solid var(--border);
        border-radius: 16px;
        padding: 10px 10px 10px 16px;
        background: var(--bg);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .input-box:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(124, 109, 250, 0.1);
      }
      textarea#inp {
        flex: 1;
        border: none;
        outline: none;
        resize: none;
        font-family: inherit;
        font-size: 14px;
        color: var(--text);
        max-height: 120px;
        line-height: 1.6;
        background: transparent;
        padding: 4px 0;
      }
      textarea#inp::placeholder {
        color: var(--dim);
      }
      .btns {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .icon-btn {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--muted);
        cursor: pointer;
        font-size: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .icon-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .send-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: var(--accent);
        border: none;
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .send-btn:hover {
        background: #6858e0;
        transform: scale(1.05);
      }
      .send-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }
      .stop-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: #ef4444;
        border: none;
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .stop-btn:hover {
        background: #dc2626;
        transform: scale(1.05);
      }
      .input-hint {
        text-align: center;
        font-size: 11px;
        color: var(--dim);
        margin-top: 10px;
      }
      .previews {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }
      .prev-chip {
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 5px 10px;
        font-size: 12px;
        color: var(--muted);
        background: var(--surface);
      }
      .prev-chip img {
        width: 28px;
        height: 28px;
        object-fit: cover;
        border-radius: 4px;
      }
      .prev-chip button {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--dim);
        font-size: 13px;
      }
      .prev-chip button:hover {
        color: #e53;
      }
      @media (max-width: 600px) {
        .welcome h1 {
          font-size: 20px;
        }
        .bubble {
          max-width: 88%;
        }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-logo">
        <div class="dot">&#10022;</div>
        NexusAI
      </div>
      <button class="new-btn" onclick="clearChat()">+ New chat</button>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="welcome" id="welcome">
        <div class="welcome-avatar">&#10022;</div>
        <h1>Hi, I'm <span>NexusAI</span>.<br />How can I help you today?</h1>
        <p>
          Ask me anything — I can answer questions, analyze images, read PDFs,
          and more.
        </p>
        <div class="suggestions" id="sugBox"></div>
      </div>
    </div>

    <div class="input-wrap">
      <div class="previews" id="previews"></div>
      <div class="input-box">
        <textarea
          id="inp"
          rows="1"
          placeholder="Message NexusAI..."
          onkeydown="onKey(event)"
          oninput="resize(this)"
        ></textarea>
        <div class="btns">
          <button
            class="icon-btn"
            title="Upload file"
            onclick="document.getElementById('fileInp').click()"
          >
            &#128206;
          </button>
          <input
            type="file"
            id="fileInp"
            accept="image/*,.pdf,.txt,.md,.csv,.json"
            multiple
            style="display: none"
            onchange="onFiles(event)"
          />
          <button class="send-btn" id="sendBtn" onclick="send()">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="white">
              <path
                d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"
              />
            </svg>
          </button>
          <button
            class="stop-btn"
            id="stopBtn"
            onclick="stopGen()"
            style="display: none"
          >
            <svg viewBox="0 0 24 24" width="14" height="14" fill="white">
              <rect x="4" y="4" width="16" height="16" rx="2" />
            </svg>
          </button>
        </div>
      </div>
      <div class="input-hint">
        NexusAI can make mistakes. Use your judgment for important decisions.
      </div>
    </div>

    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

      var chatHistory = [];
      var pending = [];
      var abortCtrl = null;
      var cachedCoords = null;
      var sugIndex = 0;
      var sugTimer = null;

      var SYS =
        "You are NexusAI, a helpful and friendly AI assistant. Answer clearly and concisely. Use markdown for formatting when helpful. When sharing links format them as [text](url).";

      var ALL_SUGS = [
        [
          "Write a LinkedIn post about AI",
          "Explain machine learning simply",
          "Summarize a document for me",
          "Top skills to learn in 2025",
        ],
        [
          "What is generative AI?",
          "Write a professional email",
          "Give me productivity tips",
          "What is prompt engineering?",
        ],
        [
          "Explain Python in simple terms",
          "Help me write a resume",
          "Explain data science basics",
          "How to learn coding fast?",
        ],
        [
          "What can you do?",
          "Tell me a fun world fact",
          "Give me a startup idea",
          "Best books on AI",
        ],
        [
          "How does AI generate images?",
          "Basic investment tips",
          "Future of electric vehicles",
          "Tips to reduce stress",
        ],
      ];
      var EMOJIS = [
        "✍️",
        "💡",
        "📄",
        "🚀",
        "🌤️",
        "📧",
        "🎯",
        "🔍",
        "🐍",
        "💼",
        "📊",
        "🤖",
        "🌍",
        "💰",
        "🎨",
        "📚",
        "🚗",
        "🧘",
        "📸",
        "🔐",
      ];

      function renderSugs(items) {
        var box = document.getElementById("sugBox");
        if (!box) return;
        var html = "";
        for (var i = 0; i < items.length; i++)
          html +=
            '<button class="sug" onclick="sug(this)">' +
            EMOJIS[i] +
            " " +
            items[i] +
            "</button>";
        box.innerHTML = html;
      }

      function rotateSugs() {
        var box = document.getElementById("sugBox");
        if (!box) return;
        box.style.opacity = "0";
        box.style.transition = "opacity 0.4s";
        setTimeout(function () {
          sugIndex = (sugIndex + 1) % ALL_SUGS.length;
          renderSugs(ALL_SUGS[sugIndex]);
          box.style.opacity = "1";
        }, 400);
      }

      function startRot() {
        renderSugs(ALL_SUGS[0]);
        sugTimer = setInterval(rotateSugs, 4000);
      }
      function stopRot() {
        clearInterval(sugTimer);
        sugTimer = null;
      }
      startRot();

      function showStop() {
        document.getElementById("sendBtn").style.display = "none";
        document.getElementById("stopBtn").style.display = "flex";
      }
      function showSend() {
        document.getElementById("sendBtn").style.display = "flex";
        document.getElementById("stopBtn").style.display = "none";
        document.getElementById("sendBtn").disabled = false;
      }

      function stopGen() {
        if (abortCtrl) {
          abortCtrl.abort();
          abortCtrl = null;
        }
        removeTyping();
        addMsg("bot", "Response stopped.");
        showSend();
      }

      function resize(el) {
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 120) + "px";
      }
      function onKey(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      }
      function sug(btn) {
        var txt = btn.textContent.replace(/^./, "").trim();
        document.getElementById("inp").value = txt;
        send();
      }

      function clearChat() {
        chatHistory = [];
        pending = [];
        stopRot();
        document.getElementById("previews").innerHTML = "";
        document.getElementById("chatArea").innerHTML =
          '<div class="welcome" id="welcome"><div class="welcome-avatar">&#10022;</div>' +
          "<h1>Hi, I'm <span>NexusAI</span>.<br/>How can I help you today?</h1>" +
          "<p>Ask me anything — I can answer questions, analyze images, read PDFs, and more.</p>" +
          '<div class="suggestions" id="sugBox"></div></div>';
        sugIndex = 0;
        startRot();
      }

      function fmt(t) {
        t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, function (_, code) {
          var id = "cb" + Math.random().toString(36).slice(2);
          return (
            '<div style="position:relative"><pre><code>' +
            code +
            '</code></pre><button class="copy-btn" id="' +
            id +
            '" onclick="copyCode(this)">&#8682; Copy</button></div>'
          );
        });
        t = t.replace(/`([^`]+)`/g, "<code>$1</code>");
        t = t.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        t = t.replace(
          /\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,
          '<a href="$2" target="_blank">$1</a>',
        );
        t = t.replace(/(https?:\/\/[^\s<"]+)/g, function (u) {
          return '<a href="' + u + '" target="_blank">' + u + "</a>";
        });
        t = t.replace(/\n/g, "<br/>");
        return t;
      }

      function copyCode(btn) {
        var pre = btn.previousElementSibling;
        var code = pre ? pre.innerText : "";
        navigator.clipboard.writeText(code).then(function () {
          btn.textContent = "Copied!";
          btn.classList.add("copied");
          setTimeout(function () {
            btn.innerHTML = "&#8682; Copy";
            btn.classList.remove("copied");
          }, 2000);
        });
      }

      function addMsg(role, text, fileInfo) {
        var area = document.getElementById("chatArea");
        var w = document.getElementById("welcome");
        if (w) {
          w.remove();
          stopRot();
        }
        var d = document.createElement("div");
        d.className = "msg " + role;
        var av = role === "bot" ? "&#10022;" : "&#129489;";
        var inner = '<div class="msg-av">' + av + '</div><div class="bubble">';
        if (fileInfo) {
          if (fileInfo.type === "image")
            inner +=
              '<img src="' + fileInfo.url + '" style="max-width:240px"/>';
          else
            inner +=
              '<div class="file-pill">&#128196; ' + fileInfo.name + "</div>";
          if (text)
            inner += '<div style="margin-top:8px">' + fmt(text) + "</div>";
        } else {
          inner += fmt(text);
        }
        inner += "</div>";
        d.innerHTML = inner;
        area.appendChild(d);
        area.scrollTop = area.scrollHeight;
      }

      function addTyping() {
        var area = document.getElementById("chatArea");
        var w = document.getElementById("welcome");
        if (w) {
          w.remove();
          stopRot();
        }
        var d = document.createElement("div");
        d.className = "msg bot";
        d.id = "typing";
        d.innerHTML =
          '<div class="bubble" style="border-top-left-radius:18px"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
        area.appendChild(d);
        area.scrollTop = area.scrollHeight;
      }

      function removeTyping() {
        var t = document.getElementById("typing");
        if (t) t.remove();
      }

      async function onFiles(e) {
        for (var i = 0; i < e.target.files.length; i++)
          await addFile(e.target.files[i]);
        e.target.value = "";
      }

      async function addFile(file) {
        if (file.type.startsWith("image/")) {
          var url = URL.createObjectURL(file);
          var b64 = await toB64(file);
          pending.push({
            type: "image",
            name: file.name,
            url: url,
            b64: b64,
            mime: file.type,
          });
          chip("&#128248; " + file.name, pending.length - 1, url);
        } else if (file.type === "application/pdf") {
          var txt = await readPDF(file);
          pending.push({ type: "text", name: file.name, content: txt });
          chip("&#128196; " + file.name, pending.length - 1, null);
        } else {
          var txt2 = await file.text();
          pending.push({ type: "text", name: file.name, content: txt2 });
          chip("&#128196; " + file.name, pending.length - 1, null);
        }
      }

      function chip(label, i, img) {
        var p = document.getElementById("previews");
        var c = document.createElement("div");
        c.className = "prev-chip";
        c.id = "c" + i;
        c.innerHTML =
          (img ? '<img src="' + img + '"/>' : "") +
          label +
          '<button onclick="rm(' +
          i +
          ')">&#10005;</button>';
        p.appendChild(c);
      }

      function rm(i) {
        pending.splice(i, 1);
        var c = document.getElementById("c" + i);
        if (c) c.remove();
      }

      function toB64(f) {
        return new Promise(function (res, rej) {
          var r = new FileReader();
          r.onload = function () {
            res(r.result.split(",")[1]);
          };
          r.onerror = rej;
          r.readAsDataURL(f);
        });
      }

      async function readPDF(file) {
        var buf = await file.arrayBuffer();
        var pdf = await pdfjsLib.getDocument({ data: buf }).promise;
        var t = "[PDF: " + file.name + ", " + pdf.numPages + " pages]\n\n";
        for (var i = 1; i <= Math.min(pdf.numPages, 15); i++) {
          var pg = await pdf.getPage(i);
          var c = await pg.getTextContent();
          t +=
            "Page " +
            i +
            ":\n" +
            c.items
              .map(function (s) {
                return s.str;
              })
              .join(" ") +
            "\n\n";
        }
        return t;
      }

      // ── Weather via Netlify Function ──
      function extractCity(txt) {
        var m = txt.match(
          /(?:in|at|for|of)\s+([A-Za-z][A-Za-z ]{1,25})(?:\?|$)/i,
        );
        if (m && m[1]) return m[1].trim();
        var m2 = txt.match(
          /([A-Za-z][A-Za-z ]{1,20})\s+(?:weather|temperature|temp|forecast)/i,
        );
        if (m2 && m2[1]) return m2[1].trim();
        return null;
      }

      async function fetchWeatherAndRespond(params, userQ) {
        try {
          abortCtrl = new AbortController();
          var r = await fetch(
            "/.netlify/functions/weather?" + new URLSearchParams(params),
            {
              signal: abortCtrl.signal,
            },
          );
          var d = await r.json();
          if (!r.ok) throw new Error(d.error || "City not found");

          var ctx =
            'User asked: "' +
            userQ +
            '". Live weather - Location: ' +
            d.name +
            ", " +
            d.country +
            ". Condition: " +
            d.description +
            ". Temp: " +
            d.temp +
            "C (feels like " +
            d.feels_like +
            "C)." +
            " Humidity: " +
            d.humidity +
            "%. Wind: " +
            d.wind_speed +
            " m/s." +
            " Give a short friendly weather summary with outfit/activity suggestions.";

          var chatR = await fetch("/.netlify/functions/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "llama-3.1-8b-instant",
              messages: [
                { role: "system", content: SYS },
                { role: "user", content: ctx },
              ],
              max_tokens: 1024,
            }),
            signal: abortCtrl.signal,
          });
          var chatD = await chatR.json();
          var reply = chatD.choices[0].message.content;
          chatHistory.push({ role: "user", content: ctx });
          chatHistory.push({ role: "assistant", content: reply });
          removeTyping();
          addMsg("bot", reply);
        } catch (e) {
          if (e.name === "AbortError") return;
          removeTyping();
          addMsg("bot", "Error: " + e.message);
        } finally {
          abortCtrl = null;
          showSend();
        }
      }

      async function getWeather(userQ) {
        userQ = userQ || "What is the weather like right now?";
        addMsg("user", userQ);
        addTyping();
        showStop();
        var city = extractCity(userQ);
        if (city) {
          await fetchWeatherAndRespond({ city: city }, userQ);
          return;
        }
        if (cachedCoords) {
          await fetchWeatherAndRespond(
            { lat: cachedCoords.lat, lon: cachedCoords.lon },
            userQ,
          );
          return;
        }
        navigator.geolocation.getCurrentPosition(
          async function (pos) {
            cachedCoords = {
              lat: pos.coords.latitude,
              lon: pos.coords.longitude,
            };
            await fetchWeatherAndRespond(
              { lat: cachedCoords.lat, lon: cachedCoords.lon },
              userQ,
            );
          },
          function () {
            removeTyping();
            showSend();
            addMsg("bot", "Location denied. Try: 'weather in Mumbai'");
          },
        );
      }

      // ── Chat via Netlify Function ──
      async function send() {
        var inp = document.getElementById("inp");
        var txt = inp.value.trim();
        if (!txt && pending.length === 0) return;

        var weatherRegex =
          /weather|temperature|temp|forecast|raining|sunny|cloudy|humidity/i;
        if (weatherRegex.test(txt)) {
          inp.value = "";
          inp.style.height = "auto";
          await getWeather(txt);
          return;
        }

        var files = pending.slice();
        pending = [];
        document.getElementById("previews").innerHTML = "";
        inp.value = "";
        inp.style.height = "auto";
        showStop();

        var hasImg = files.some(function (f) {
          return f.type === "image";
        });
        var textFiles = files.filter(function (f) {
          return f.type === "text";
        });

        if (files.length && files[0].type === "image")
          addMsg("user", txt, {
            type: "image",
            url: files[0].url,
            name: files[0].name,
          });
        else if (textFiles.length)
          addMsg("user", txt || "Analyze this file", {
            type: "file",
            name: files
              .map(function (f) {
                return f.name;
              })
              .join(", "),
          });
        else addMsg("user", txt);

        addTyping();

        var ctx = txt;
        if (textFiles.length)
          ctx +=
            "\n\n" +
            textFiles
              .map(function (f) {
                return "File: " + f.name + "\n" + f.content.slice(0, 8000);
              })
              .join("\n---\n");

        var msgContent;
        if (hasImg) {
          msgContent = [];
          var imgFiles = files.filter(function (f) {
            return f.type === "image";
          });
          for (var i = 0; i < imgFiles.length; i++)
            msgContent.push({
              type: "image_url",
              image_url: {
                url: "data:" + imgFiles[i].mime + ";base64," + imgFiles[i].b64,
              },
            });
          msgContent.push({
            type: "text",
            text: ctx || "Describe this image.",
          });
        } else {
          msgContent = ctx || "Help me.";
        }

        chatHistory.push({ role: "user", content: msgContent });

        try {
          abortCtrl = new AbortController();
          var model = hasImg
            ? "llama-3.2-11b-vision-preview"
            : "llama-3.1-8b-instant";

          var r = await fetch("/.netlify/functions/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: model,
              messages: [{ role: "system", content: SYS }].concat(chatHistory),
              max_tokens: 2048,
            }),
            signal: abortCtrl.signal,
          });

          var d = await r.json();
          if (!r.ok) {
            var errMsg = d.error ? d.error.message : "Unknown error";
            if (r.status === 429) {
              removeTyping();
              addMsg(
                "bot",
                "⚠️ Rate limit exceeded. Please wait a minute and try again.",
              );
            } else if (r.status === 401) {
              removeTyping();
              addMsg(
                "bot",
                "⚠️ Invalid API key. Please check your Groq key in Netlify environment variables.",
              );
            } else throw new Error(errMsg);
            return;
          }

          var reply = d.choices[0].message.content;
          chatHistory.push({ role: "assistant", content: reply });
          removeTyping();
          addMsg("bot", reply);
        } catch (e) {
          if (e.name === "AbortError") return;
          removeTyping();
          addMsg("bot", "Error: " + e.message);
        } finally {
          abortCtrl = null;
          showSend();
          document.getElementById("inp").focus();
        }
      }
    </script>
  </body>
</html>
